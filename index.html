<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Web AI Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b17;
      --bg-soft: #0d1428;
      --panel: #101a33;
      --panel-2: #172344;
      --text: #ecf0ff;
      --muted: #9ca9d4;
      --accent: #69a2ff;
      --accent-2: #4d7de0;
      --ok: #6ad3a9;
      --border: #273763;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, #1c2f63 0%, transparent 60%),
        radial-gradient(900px 500px at 90% -20%, #12386d 0%, transparent 55%),
        linear-gradient(180deg, #080d1c, var(--bg));
      color: var(--text);
      font: 15px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 1.25rem;
    }

    .app {
      width: min(980px, 100%);
      background: color-mix(in srgb, var(--panel) 94%, black);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.85rem;
      background: color-mix(in srgb, var(--panel-2) 55%, transparent);
    }

    h1 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
      font-weight: 650;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.1rem;
    }

    .header-left {
      display: grid;
      gap: 0.15rem;
    }

    .status {
      padding: 0.35rem 0.55rem;
      border: 1px solid #2f4d82;
      border-radius: 999px;
      color: #c7d8ff;
      background: rgba(29, 51, 90, 0.58);
      font-size: 0.74rem;
      white-space: nowrap;
    }

    .chat {
      height: min(64vh, 620px);
      overflow-y: auto;
      padding: 1rem;
      display: grid;
      align-content: start;
      gap: 0.75rem;
      background: linear-gradient(180deg, var(--bg-soft), #0a1124);
    }

    .bubble {
      max-width: min(86%, 740px);
      padding: 0.68rem 0.8rem;
      border-radius: 13px;
      white-space: pre-wrap;
      line-height: 1.45;
      animation: pop-in 180ms ease-out;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.2);
    }

    @keyframes pop-in {
      from {
        transform: translateY(4px);
        opacity: 0.4;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .user {
      margin-left: auto;
      background: linear-gradient(180deg, #4b7fe5, #3c67c5);
      border: 1px solid #557ed2;
    }

    .assistant {
      margin-right: auto;
      background: #172448;
      border: 1px solid #2e4579;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.95rem;
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-2) 30%, transparent);
      color: var(--muted);
      font-size: 0.79rem;
    }

    .chip {
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      border: 1px solid #395894;
      color: #c5d6ff;
      background: rgba(29, 52, 96, 0.5);
      margin-left: 0.3rem;
      display: inline-block;
    }

    form {
      padding: 0.82rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      background: color-mix(in srgb, var(--panel-2) 45%, transparent);
    }

    textarea,
    button {
      border: 1px solid #324c85;
      border-radius: 10px;
      background: #0e1732;
      color: var(--text);
      font: inherit;
      padding: 0.65rem 0.75rem;
    }

    textarea {
      min-height: 48px;
      resize: vertical;
      max-height: 170px;
    }

    textarea::placeholder {
      color: #7f8db8;
    }

    button {
      min-width: 105px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border: 0;
      font-weight: 600;
      cursor: pointer;
      transition: transform 100ms ease, filter 100ms ease;
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 760px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      form {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="header-left">
        <h1>Offline Web AI Chat</h1>
        <div class="hint">Runs fully in your browser. Optimized replies with lightweight on-page learning.</div>
      </div>
      <div class="status" id="modelStatus">Model: adaptive rule engine</div>
    </header>

    <section class="chat" id="chat" aria-live="polite"></section>

    <div class="meta-row">
      <span id="memoryInfo">Memory: no topics yet</span>
      <span id="speedInfo">Latency target <span class="chip">fast mode</span></span>
    </div>

    <form id="chatForm">
      <textarea id="prompt" rows="2" placeholder="Type a message (try: summarize ..., /teach ..., /good, /bad, /train)" required></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <script>
    const chatEl = document.getElementById('chat');
    const promptEl = document.getElementById('prompt');
    const memoryInfoEl = document.getElementById('memoryInfo');
    const modelStatusEl = document.getElementById('modelStatus');

    function appendBubble(text, role = 'assistant') {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function updateUiState(state) {
      const topics = state.topics || [];
      const learnedCount = state.learned_pairs || 0;
      const qualityScore = state.quality_score || 0;
      const responseStyle = state.response_style || 'balanced';

      memoryInfoEl.textContent = topics.length
        ? `Memory: ${topics.join(', ')} · learned pairs: ${learnedCount} · score: ${qualityScore}`
        : `Memory: no topics yet · learned pairs: ${learnedCount} · score: ${qualityScore}`;
      modelStatusEl.textContent = `Model: python adaptive backend (${responseStyle}, trained)`;
    }

    async function fetchState() {
      try {
        const response = await fetch('/api/state');
        if (!response.ok) throw new Error('State fetch failed');
        const state = await response.json();
        updateUiState(state);
      } catch (error) {
        appendBubble('Could not connect to Python backend. Start server with: python3 app.py', 'assistant');
      }
    }

    async function sendMessage(userText) {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userText })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: 'Backend error' }));
        throw new Error(err.error || 'Backend error');
      }

      return response.json();
    }

    document.getElementById('chatForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const userText = promptEl.value.trim();
      if (!userText) return;

      appendBubble(userText, 'user');
      promptEl.value = '';

      try {
        const data = await sendMessage(userText);
        setTimeout(() => appendBubble(data.reply, 'assistant'), 120);
        if (data.state) updateUiState(data.state);
      } catch (error) {
        appendBubble(`Backend error: ${error.message}`, 'assistant');
      }
    });

    appendBubble('Welcome! Python backend is enabled. Try: "summarize ...", "plan launch", "/teach question => answer", then "/good" or "/bad".', 'assistant');
    fetchState();
  </script>
</body>
</html>
