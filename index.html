<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Web AI Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b17;
      --bg-soft: #0d1428;
      --panel: #101a33;
      --panel-2: #172344;
      --text: #ecf0ff;
      --muted: #9ca9d4;
      --accent: #69a2ff;
      --accent-2: #4d7de0;
      --ok: #6ad3a9;
      --border: #273763;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, #1c2f63 0%, transparent 60%),
        radial-gradient(900px 500px at 90% -20%, #12386d 0%, transparent 55%),
        linear-gradient(180deg, #080d1c, var(--bg));
      color: var(--text);
      font: 15px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 1.25rem;
    }

    .app {
      width: min(980px, 100%);
      background: color-mix(in srgb, var(--panel) 94%, black);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.85rem;
      background: color-mix(in srgb, var(--panel-2) 55%, transparent);
    }

    h1 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
      font-weight: 650;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.1rem;
    }

    .header-left {
      display: grid;
      gap: 0.15rem;
    }

    .status {
      padding: 0.35rem 0.55rem;
      border: 1px solid #2f4d82;
      border-radius: 999px;
      color: #c7d8ff;
      background: rgba(29, 51, 90, 0.58);
      font-size: 0.74rem;
      white-space: nowrap;
    }

    .chat {
      height: min(64vh, 620px);
      overflow-y: auto;
      padding: 1rem;
      display: grid;
      align-content: start;
      gap: 0.75rem;
      background: linear-gradient(180deg, var(--bg-soft), #0a1124);
    }

    .bubble {
      max-width: min(86%, 740px);
      padding: 0.68rem 0.8rem;
      border-radius: 13px;
      white-space: pre-wrap;
      line-height: 1.45;
      animation: pop-in 180ms ease-out;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.2);
    }

    @keyframes pop-in {
      from {
        transform: translateY(4px);
        opacity: 0.4;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .user {
      margin-left: auto;
      background: linear-gradient(180deg, #4b7fe5, #3c67c5);
      border: 1px solid #557ed2;
    }

    .assistant {
      margin-right: auto;
      background: #172448;
      border: 1px solid #2e4579;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.95rem;
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-2) 30%, transparent);
      color: var(--muted);
      font-size: 0.79rem;
    }

    .chip {
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      border: 1px solid #395894;
      color: #c5d6ff;
      background: rgba(29, 52, 96, 0.5);
      margin-left: 0.3rem;
      display: inline-block;
    }

    form {
      padding: 0.82rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      background: color-mix(in srgb, var(--panel-2) 45%, transparent);
    }

    textarea,
    button {
      border: 1px solid #324c85;
      border-radius: 10px;
      background: #0e1732;
      color: var(--text);
      font: inherit;
      padding: 0.65rem 0.75rem;
    }

    textarea {
      min-height: 48px;
      resize: vertical;
      max-height: 170px;
    }

    textarea::placeholder {
      color: #7f8db8;
    }

    button {
      min-width: 105px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border: 0;
      font-weight: 600;
      cursor: pointer;
      transition: transform 100ms ease, filter 100ms ease;
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 760px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      form {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="header-left">
        <h1>Offline Web AI Chat</h1>
        <div class="hint">Runs fully in your browser. Optimized replies with lightweight on-page learning.</div>
      </div>
      <div class="status" id="modelStatus">Model: adaptive rule engine</div>
    </header>

    <section class="chat" id="chat" aria-live="polite"></section>

    <div class="meta-row">
      <span id="memoryInfo">Memory: no topics yet</span>
      <span id="speedInfo">Latency target <span class="chip">fast mode</span></span>
    </div>

    <form id="chatForm">
      <textarea id="prompt" rows="2" placeholder="Type a message (try: summarize ..., plan ..., or /train)" required></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <script>
    const chatEl = document.getElementById('chat');
    const promptEl = document.getElementById('prompt');
    const memoryInfoEl = document.getElementById('memoryInfo');
    const modelStatusEl = document.getElementById('modelStatus');

    const memory = {
      userName: '',
      topics: [],
      responseStyle: 'balanced',
      conversationSamples: [],
      learnedMap: {},
      metrics: {
        turns: 0,
        avgInputLength: 0
      }
    };

    function loadTrainingState() {
      try {
        const saved = localStorage.getItem('offline-ai-training-v1');
        if (!saved) return;
        const parsed = JSON.parse(saved);
        memory.learnedMap = parsed.learnedMap || {};
        memory.responseStyle = parsed.responseStyle || memory.responseStyle;
      } catch {
        // ignore invalid local state
      }
    }

    function saveTrainingState() {
      const trainingState = {
        learnedMap: memory.learnedMap,
        responseStyle: memory.responseStyle
      };
      localStorage.setItem('offline-ai-training-v1', JSON.stringify(trainingState));
    }

    function appendBubble(text, role = 'assistant') {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function updateUiState() {
      const topics = memory.topics.slice(-3);
      const learnedCount = Object.keys(memory.learnedMap).length;
      memoryInfoEl.textContent = topics.length
        ? `Memory: ${topics.join(', ')} · learned pairs: ${learnedCount}`
        : `Memory: no topics yet · learned pairs: ${learnedCount}`;
      modelStatusEl.textContent = `Model: adaptive rule engine (${memory.responseStyle}, trained)`;
    }

    function tokenize(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(Boolean);
    }

    function rememberTopic(text) {
      const keywords = tokenize(text).filter((word) => word.length > 4);
      memory.topics = [...new Set([...memory.topics, ...keywords])].slice(-14);
    }

    function updateMetrics(input) {
      memory.metrics.turns += 1;
      const len = input.trim().length;
      memory.metrics.avgInputLength =
        (memory.metrics.avgInputLength * (memory.metrics.turns - 1) + len) / memory.metrics.turns;

      if (memory.metrics.avgInputLength > 110) {
        memory.responseStyle = 'detailed';
      } else if (memory.metrics.avgInputLength < 45) {
        memory.responseStyle = 'concise';
      } else {
        memory.responseStyle = 'balanced';
      }
    }

    function trainFromConversation(userText, aiReply) {
      memory.conversationSamples.push({ userText, aiReply });
      memory.conversationSamples = memory.conversationSamples.slice(-8);

      const tokens = tokenize(userText);
      if (tokens.includes('short') || tokens.includes('brief')) {
        memory.responseStyle = 'concise';
      }
      if (tokens.includes('detailed') || tokens.includes('deep') || tokens.includes('explain')) {
        memory.responseStyle = 'detailed';
      }

      const key = tokenize(userText).slice(0, 8).join(' ');
      if (key.length > 8 && !memory.learnedMap[key]) {
        memory.learnedMap[key] = aiReply;
      }

      saveTrainingState();
    }

    function matchLearnedReply(input) {
      const normalized = tokenize(input).join(' ');
      if (!normalized) return '';

      let bestScore = 0;
      let bestReply = '';

      Object.entries(memory.learnedMap).forEach(([key, reply]) => {
        const keyTokens = new Set(key.split(' '));
        const inputTokens = new Set(normalized.split(' '));
        let overlap = 0;
        keyTokens.forEach((token) => {
          if (inputTokens.has(token)) overlap += 1;
        });

        const score = overlap / Math.max(1, keyTokens.size);
        if (score > bestScore) {
          bestScore = score;
          bestReply = reply;
        }
      });

      return bestScore >= 0.6 ? `From training memory: ${bestReply}` : '';
    }

    function teachFromInput(input) {
      const payload = input.replace(/^\/teach\s*/i, '').trim();
      const separator = payload.indexOf('=>');
      if (separator < 0) {
        return 'Usage: /teach question => answer';
      }

      const question = payload.slice(0, separator).trim();
      const answer = payload.slice(separator + 2).trim();
      if (!question || !answer) {
        return 'Please provide both question and answer. Example: /teach refund policy => Our refund window is 30 days.';
      }

      const key = tokenize(question).slice(0, 10).join(' ');
      if (!key) return 'I could not parse that training question. Try longer text.';

      memory.learnedMap[key] = answer;
      saveTrainingState();
      updateUiState();
      return `Learned new pair: "${question}"`;
    }

    function summarizeText(content) {
      const sentences = content
        .split(/(?<=[.!?])\s+/)
        .map((s) => s.trim())
        .filter(Boolean);

      if (sentences.length <= 1) {
        return `Summary: ${content}`;
      }

      const first = sentences[0];
      const middle = sentences[Math.floor(sentences.length / 2)] || '';
      const last = sentences[sentences.length - 1] || '';
      const merged = [first, middle, last]
        .filter((value, index, arr) => value && arr.indexOf(value) === index)
        .join(' ');

      return `Summary: ${merged}`;
    }

    function buildPlan(input) {
      const goal = input.replace(/^plan\s*/i, '').trim() || 'your goal';
      return `Plan for ${goal}:\n1) Define the outcome and success metric.\n2) Build the smallest working version.\n3) Test with real users and note friction.\n4) Improve one high-impact area each cycle.`;
    }

    function getTonePrefix() {
      if (memory.responseStyle === 'concise') return 'Quick answer: ';
      if (memory.responseStyle === 'detailed') return 'Detailed answer: ';
      return '';
    }

    function generateReply(input) {
      const text = input.toLowerCase().trim();

      if (text === '/train') {
        const sampleCount = memory.conversationSamples.length;
        const learnedCount = Object.keys(memory.learnedMap).length;
        return `Training complete for this session. Learned from ${sampleCount} sample${sampleCount === 1 ? '' : 's'}, ${memory.topics.length} topic signals, and ${learnedCount} saved training pairs.`;
      }

      if (text.startsWith('/teach')) {
        return teachFromInput(input);
      }

      const learnedReply = matchLearnedReply(input);
      if (learnedReply) return learnedReply;

      const nameMatch = input.match(/(?:my name is|i am|i'm)\s+([a-zA-Z]+)/i);
      if (nameMatch) {
        memory.userName = nameMatch[1];
        return `Nice to meet you, ${memory.userName}! I'll remember your name during this session.`;
      }

      if (/\b(hello|hi|hey)\b/.test(text)) {
        return `${getTonePrefix()}Hey${memory.userName ? ` ${memory.userName}` : ''}! How can I help you today?`;
      }

      if (/\b(who are you|what are you)\b/.test(text)) {
        return 'I am an offline web AI assistant using optimized rule logic with in-session adaptive behavior.';
      }

      if (/\b(help|what can you do)\b/.test(text)) {
        return 'I can chat, summarize content, create quick plans, brainstorm ideas, and adapt response style from your conversation.';
      }
    }

      if (text.startsWith('summarize ')) {
        const content = input.slice(10).trim();
        if (!content) return 'Please add text after "summarize".';
        return summarizeText(content);
      }

      if (text.startsWith('plan')) {
        return buildPlan(input);
      }

      if (/\b(idea|brainstorm)\b/.test(text)) {
        const seed = memory.topics[memory.topics.length - 1] || 'your project';
        return `${getTonePrefix()}Brainstorm for ${seed}:\n1) Build one focused MVP flow\n2) Add a simple onboarding checklist\n3) Collect feedback from first 10 users\n4) Ship one visible improvement per week`;
      }

      rememberTopic(input);
      const recent = memory.topics.slice(-3).join(', ');

      const fallbackReplies = [
        `${getTonePrefix()}Interesting. Tell me more${memory.userName ? `, ${memory.userName}` : ''}.`,
        `${getTonePrefix()}I can convert this into a step-by-step plan if you want.`,
        `${getTonePrefix()}Want a short answer or a deeper breakdown?`,
        recent
          ? `${getTonePrefix()}I noticed recurring topics: ${recent}. Want to focus on one?`
          : `${getTonePrefix()}Share a bit more context and I can respond more precisely.`
      ];

      return fallbackReplies[Math.floor(Math.random() * fallbackReplies.length)];
    }

    document.getElementById('chatForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const userText = promptEl.value.trim();
      if (!userText) return;

      appendBubble(userText, 'user');
      promptEl.value = '';

      updateMetrics(userText);
      rememberTopic(userText);

      const reply = generateReply(userText);
      trainFromConversation(userText, reply);
      updateUiState();

      setTimeout(() => appendBubble(reply, 'assistant'), 120);
    });

    loadTrainingState();
    appendBubble('Welcome! I am an offline AI assistant. Try: "summarize ...", "plan launch", "/train", or "/teach question => answer".', 'assistant');
    updateUiState();
  </script>
</body>
</html>
